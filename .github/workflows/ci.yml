name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Inherits standard CI logic from the organizational .github repository
  go-ci:
    # Set to true if this is a Go project, or use conditionals
    if: false 
    uses: stillsystems/.github/.github/workflows/reusable-go-ci.yml@main

  node-ci:
    # Set to true if this is a Node project
    if: false
    uses: stillsystems/.github/.github/workflows/reusable-node-ci.yml@main
